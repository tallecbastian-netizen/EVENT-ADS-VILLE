<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci — Elev8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#18e39e;
    --green-dark:#0c8f63;
    --black:#08090a;
    --line:rgba(24,227,158,0.18);
    --text:#eef2f0;
    --muted:#9aa7a2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 50% 0%, rgba(24,227,158,0.16), transparent 60%),
      var(--black);
    color:var(--text); font-family:'Manrope', sans-serif; line-height:1.5;
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:64px 6vw;
  }
  .logo-mark{width:52px; margin-bottom:18px; filter:drop-shadow(0 0 20px rgba(24,227,158,0.4));}
  .check{
    width:56px; height:56px; margin-bottom:18px;
    border-radius:50%; border:1.5px solid var(--green);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 30px rgba(24,227,158,0.35);
  }
  h1{
    font-family:'Space Grotesk', sans-serif; font-weight:700;
    font-size:clamp(1.8rem, 6vw, 2.6rem); color:#fff; letter-spacing:-0.5px;
  }
  p.sub{ max-width:440px; margin:16px auto 34px; color:var(--muted); font-size:0.98rem; }
  .social-row{display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}
  .social-btn{
    display:flex; align-items:center; gap:8px;
    padding:14px 24px; border-radius:12px; text-decoration:none;
    font-weight:600; font-size:0.95rem; border:1px solid var(--line);
    color:#fff; background:rgba(255,255,255,0.03);
    transition:border-color .2s ease, transform .2s ease;
  }
  .social-btn:hover{border-color:var(--green); transform:translateY(-2px);}
  .social-btn svg{width:19px; height:19px;}
  .social-btn.whatsapp svg{color:#25D366;}
  .social-btn.insta svg{color:#e1306c;}
  .logo-word{
    margin-top:44px; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:1rem;
    background:linear-gradient(135deg,#7dffd0,var(--green) 45%,var(--green-dark));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
</style>
</head>
<body>

  <div class="check">

  </div>

  <h1>Inscription confirmée</h1>

  </div>

</body>
</html>
